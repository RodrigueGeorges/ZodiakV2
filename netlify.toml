[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/webhook/meta"
  to = "/.netlify/functions/meta-webhook"
  status = 200

[[redirects]]
  from = "/webhook/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*.css"
  to = "/assets/:splat"
  status = 200
  headers = {Content-Type = "text/css"}

[[redirects]]
  from = "/icon.svg"
  to = "/icon.svg"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[build]
  command = "npm run build:prod"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js", "web-push"]

# Cron horaire : à chaque heure, on dispatch aux profils dont
# `guidance_hour` correspond à leur heure locale dans `profiles.timezone`.
# Permet le multi-fuseau natif sans cron par timezone.
[functions."send-daily-guidance"]
  schedule = "0 * * * *"

# Génération de la guidance du jour, à 23:00 UTC (donc 00:00 / 01:00 Paris
# selon DST, soit avant que le tout premier user de la journée arrive à
# son heure de réception). On garde un seul run /jour, le cache `daily_transits`
# est partagé par tous les users.
[functions."generate-guidance"]
  schedule = "0 23 * * *"

# Web Push : envoie les notifications navigateur en parallèle des canaux
# WhatsApp/Instagram, à l'heure locale du user. Décalé de 5 min pour ne pas
# entrer en concurrence avec `send-daily-guidance` sur la même minute.
[functions."send-daily-push"]
  schedule = "5 * * * *"

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.brevo.com https://*.posthog.com https://api.whatsapp.com https://graph.facebook.com; frame-ancestors 'none';"

[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

# Service worker : on désactive le cache pour que les nouvelles versions
# soient toujours détectées sans attendre le TTL CDN.
[[headers]]
  for = "/service-worker.js"
    [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/webhook/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    X-Content-Type-Options = "nosniff"