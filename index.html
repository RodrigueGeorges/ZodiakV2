<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=2" />

    <!--
      Viewport — `user-scalable=no` retiré pour respecter WCAG SC 1.4.4
      (Resize text). Les utilisateurs doivent pouvoir zoomer.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#0B0B1A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0B0B1A" />
    <meta name="description" content="Zodiak - Votre guide astral personnel. Découvrez votre thème natal et recevez une guidance quotidienne personnalisée sur WhatsApp ou Instagram." />
    <meta name="keywords" content="astrologie, horoscope, thème natal, guidance, zodiaque, whatsapp, instagram" />

    <meta property="og:title" content="Zodiak - Votre guide astral personnel" />
    <meta property="og:description" content="Découvrez votre thème natal et recevez une guidance quotidienne personnalisée." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zodiak.app" />
    <meta property="og:image" content="/icon.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zodiak" />
    <meta name="application-name" content="Zodiak" />
    <meta name="msapplication-TileColor" content="#0B1120" />

    <link rel="manifest" href="/manifest.json?v=2" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png?v=2" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png?v=2" />

    <title>✧ Zodiak ✧ Votre guide astral personnel</title>

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Fonts : Cinzel uniquement chargé ici (Inter chargée via tailwind/system).
      Montserrat / Open Sans retirés (jamais utilisés dans le design system).
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Critical CSS (avoid FOUC) -->
    <style>
      body {
        background: #0B1120;
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
    </style>

    <script>
      // Reload automatique si un JS échoue à charger (cache busting)
      window.addEventListener('error', function (e) {
        if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.match(/\.js$/)) {
          if (!window.__RELOADED_ONCE__) {
            window.__RELOADED_ONCE__ = true;
            window.location.reload();
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Vite injecte automatiquement le CSS du build en s'appuyant sur
      `src/main.tsx` ; aucune balise <link rel="stylesheet"> hardcodée
      ne doit figurer ici (sinon le hash devient obsolète à chaque build
      et casse la prod).
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
