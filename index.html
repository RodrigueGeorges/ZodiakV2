<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=2" />

    <!--
      Viewport — `user-scalable=no` retiré pour respecter WCAG SC 1.4.4
      (Resize text). Les utilisateurs doivent pouvoir zoomer.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Zodiak — guidance quotidienne calibrée sur ton thème natal, envoyée sur WhatsApp ou Instagram. Carte du ciel, chat astral, synastries. Essai sans carte bleue." />
    <meta name="keywords" content="astrologie, thème natal, transit lunaire, guidance personnalisée, WhatsApp, Instagram, synastrie" />

    <meta property="og:title" content="Zodiak — Le ciel t'écrit, à ton rythme" />
    <meta property="og:description" content="Lecture précise croisée à ta carte du ciel, chaque matin où tu préfères. Thème natal, guidance et guide IA." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zodiak.app" />
    <meta property="og:image" content="/icon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:description" content="Lecture précise croisée à ta carte du ciel, sur WhatsApp ou Instagram. Thème natal, guidance et guide IA." />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zodiak" />
    <meta name="application-name" content="Zodiak" />
    <meta name="msapplication-TileColor" content="#000000" />

    <link rel="manifest" href="/manifest.json?v=2" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png?v=2" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png?v=2" />

    <title>Zodiak — guidance astrale sur ton thème natal</title>

    <!-- Polices bundlées via Fontsource (voir src/fonts.ts), pas de Google Fonts -->

    <!-- Critical CSS (avoid FOUC) -->
    <style>
      body {
        background: #000000;
        color: #F4ECDB;
        margin: 0;
        font-family: 'Inter Variable', 'Inter', system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
    </style>

    <script>
      // Reload automatique si un JS échoue à charger (cache busting)
      window.addEventListener('error', function (e) {
        if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.match(/\.js$/)) {
          if (!window.__RELOADED_ONCE__) {
            window.__RELOADED_ONCE__ = true;
            window.location.reload();
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Vite injecte automatiquement le CSS du build en s'appuyant sur
      `src/main.tsx` ; aucune balise <link rel="stylesheet"> hardcodée
      ne doit figurer ici (sinon le hash devient obsolète à chaque build
      et casse la prod).
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
